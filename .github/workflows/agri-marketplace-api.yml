name: Marketplace API (Nest + Prisma)

on:
  push:
    paths:
      - 'backend/marketplace-api/**'
      - '.github/workflows/agri-marketplace-api.yml'
  pull_request:
    paths:
      - 'backend/marketplace-api/**'
      - '.github/workflows/agri-marketplace-api.yml'

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/marketplace-api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agri
          POSTGRES_PASSWORD: agri_dev_pass
          POSTGRES_DB: agri_marketplace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agri -d agri_marketplace"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://agri:agri_dev_pass@localhost:5432/agri_marketplace?schema=public
      JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars
      OTP_DEV_CODE: '123456'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/marketplace-api/package-lock.json

      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - run: npm run lint:ci
      - run: npm run build
      - run: npm run test
      - run: npm run test:e2e
