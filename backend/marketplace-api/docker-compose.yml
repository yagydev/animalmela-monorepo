services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agri
      POSTGRES_PASSWORD: agri_dev_pass
      POSTGRES_DB: agri_marketplace
    ports:
      - '5433:5432'
    volumes:
      - agri_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - agri_redis_data:/data

volumes:
  agri_pg_data:
  agri_redis_data:
